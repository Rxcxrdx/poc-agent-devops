# SonarCloud — 1 solo proyecto para todo el repo
# Reemplaza SONAR_ORG con tu organization slug de sonarcloud.io
# Ejemplo: si tu URL es sonarcloud.io/organizations/rxcxrdx → slug = rxcxrdx

sonar.projectKey=poc-agent-devops
sonar.organization=devyzr

sonar.projectName=poc-agent-devops
sonar.projectVersion=1.0.0

# Analiza todos los servicios en services/
sonar.sources=services

sonar.sourceEncoding=UTF-8

# Excluir archivos de test y artefactos de compilación
sonar.exclusions=**/target/**,**/*test*,**/*spec*
sonar.test.inclusions=**/*test*
