# ════════════════════════════════════════════════════════════════════════════
# SonarCloud — análisis estático completo del repo (1 solo proyecto)
# ════════════════════════════════════════════════════════════════════════════
# Lo que SonarCloud analiza en cada push/PR:
#   ✓ Bugs                     — errores de lógica, null pointers, type issues
#   ✓ Vulnerabilities          — patrones inseguros, hardcoded secrets, CVE
#   ✓ Security Hotspots        — usos sospechosos que requieren revisión
#   ✓ Code Smells              — mala calidad, complejidad ciclomática alta
#   ✓ Duplications             — bloques de código duplicados (>3% bloquea QG)
#   ✓ Coverage                 — % cubierto por tests (vía sonar.coverageReportPaths)
#   ✓ Lines of Code / Files    — métricas de tamaño
#   ✓ Cognitive Complexity     — funciones difíciles de entender
#   ✓ Maintainability Rating   — A–E basado en deuda técnica
#   ✓ Reliability Rating       — A–E basado en bugs
#   ✓ Security Rating          — A–E basado en vulnerabilidades
#
# Lo que SonarCloud NO detecta (y por eso necesitamos el Conformance Gate IA):
#   ✗ BOX-001  — Endpoints no usan envelope ApiResponse<T>
#   ✗ BOX-002  — Uso de .unwrap()/.expect() (regla no activa por defecto)
#   ✗ BOX-003  — Violaciones arquitecturales semánticas
#   ✗ OCI-003  — Dockerfile ejecuta como root
#   ✗ OCI-004  — Imágenes base no aprobadas
#   ✗ OCI-005  — Healthcheck faltante
# ════════════════════════════════════════════════════════════════════════════

sonar.projectKey=Rxcxrdx_poc-agent-devops
sonar.organization=devyzr
sonar.projectName=poc-agent-devops
sonar.projectVersion=1.0.0

# ─── Sources ────────────────────────────────────────────────────────────────
sonar.sources=services
sonar.sourceEncoding=UTF-8

# ─── Exclusiones ────────────────────────────────────────────────────────────
# target/ = artefactos de cargo build (binarios, deps compiladas)
# *.lock  = lockfiles (no es código fuente)
sonar.exclusions=**/target/**,**/*.lock,**/Cargo.lock

# ─── Tests ──────────────────────────────────────────────────────────────────
# Los archivos *_test.rs y módulos #[cfg(test)] se reconocen automáticamente
sonar.test.inclusions=**/tests/**,**/*_test.rs

# ─── Cobertura (LCOV generado por cargo-llvm-cov en CI) ────────────────────
sonar.coverageReportPaths=coverage/lcov.info

# ─── Quality Gate ───────────────────────────────────────────────────────────
# Usa el "Sonar way" por defecto:
#   - 0 bugs nuevos
#   - 0 vulnerabilities nuevas
#   - 0 security hotspots sin revisar
#   - Cobertura nuevo código ≥ 80%
#   - Duplicación nuevo código ≤ 3%
#   - Maintainability/Reliability/Security Rating ≥ A en código nuevo

