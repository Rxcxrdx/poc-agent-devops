name: CI + Conformance Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ─── SECRETS REQUIRED ────────────────────────────────────────────────────────
# SONAR_TOKEN      → sonarcloud.io → My Account → Security → Generate Token
# ANTHROPIC_API_KEY → console.anthropic.com → API Keys
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── JOB 1a: Tests del servicio conforme ────────────────────────────────────
  test-rust-svc:
    name: "rust-svc · cargo test + clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/rust-svc/target
          key: rust-svc-${{ hashFiles('services/rust-svc/Cargo.lock') }}
          restore-keys: rust-svc-

      - name: cargo test
        working-directory: services/rust-svc
        run: cargo test

      - name: cargo clippy
        working-directory: services/rust-svc
        run: cargo clippy -- -D warnings

  # ── JOB 1b: Compilación del servicio no conforme ───────────────────────────
  # Demuestra que cargo test y clippy NO detectan las violaciones BOX
  test-rust-svc-bad:
    name: "rust-svc-bad · cargo test (compila, 0 tests)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/rust-svc-bad/target
          key: rust-svc-bad-${{ hashFiles('services/rust-svc-bad/Cargo.toml') }}
          restore-keys: rust-svc-bad-

      - name: cargo test
        working-directory: services/rust-svc-bad
        run: cargo test
        # Passes: 0 tests found, binary compiles OK

      - name: "cargo clippy (unwrap tampoco falla por defecto)"
        working-directory: services/rust-svc-bad
        run: cargo clippy
        # Passes: clippy::unwrap_used is NOT enabled by default

  # ── JOB 2: SonarCloud analiza TODO el repo (1 solo proyecto) ───────────────
  # PUNTO CLAVE DEL DEMO: SonarCloud analiza ambos servicios y pasa los dos.
  # No tiene reglas para BOX-001/002/003 (envelope, panics, arquitectura).
  # Solo el Conformance Gate detectará las violaciones en rust-svc-bad.
  sonarcloud:
    name: "SonarCloud · análisis completo del repo"
    needs: [test-rust-svc, test-rust-svc-bad]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Expected: PASS ✅ para ambos servicios — demuestra limitación de Sonar:
        # no detecta violaciones semánticas ni arquitecturales (BOX-001/002/003)

  # ── JOB 3: Conformance Gate — evalúa TODOS los servicios automáticamente ────
  # Un solo job escanea services/ completo.
  # Si agregas services/nuevo-svc/ no hace falta tocar este archivo.
  # PUNTO CLAVE DEL DEMO: rust-svc pasa ✅, rust-svc-bad bloquea ❌
  conformance:
    name: "Conformance Gate · todos los servicios (IA)"
    needs: [sonarcloud]
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Conformance Gate
        uses: Rxcxrdx/conformance-agent@v2
        with:
          services-dir: services
        # rust-svc  → PASS ✅
        # rust-svc-bad → BLOCK ❌ (OCI-003 + BOX-001/002)
        # job exits 1 → merge bloqueado

