name: CI + Conformance Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ─── SECRETS REQUIRED ────────────────────────────────────────────────────────
# SONAR_TOKEN      → sonarcloud.io → My Account → Security → Generate Token
# ANTHROPIC_API_KEY → console.anthropic.com → API Keys
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── JOB 1: Tests + clippy de TODOS los servicios (auto-discovery) ──────────
  # Un solo job recorre services/* y ejecuta cargo test + clippy en cada uno.
  # Si agregas services/nuevo-svc/ se incluye automáticamente — no editar yml.
  # Demuestra: cargo + clippy NO detectan violaciones BOX-001/002/003.
  test-services:
    name: "cargo test + clippy · todos los servicios"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/*/target
          key: cargo-${{ hashFiles('services/*/Cargo.lock', 'services/*/Cargo.toml') }}
          restore-keys: cargo-

      - name: Install cargo-llvm-cov (cobertura)
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo test + clippy + coverage en cada servicio
        run: |
          set -e
          mkdir -p coverage
          # LCOV combinado de todos los servicios para SonarCloud
          : > coverage/lcov.info
          for svc in services/*/; do
            name=$(basename "$svc")
            echo ""
            echo "══════════════════════════════════════════════════════════"
            echo "▶ $name"
            echo "══════════════════════════════════════════════════════════"
            (
              cd "$svc"
              cargo test
              cargo clippy -- -D warnings
              # Genera lcov por servicio y lo concatena al global
              cargo llvm-cov --lcov --output-path "../../coverage/${name}.lcov" || true
            ) || { echo "❌ $name FAILED"; exit 1; }
            cat "coverage/${name}.lcov" >> coverage/lcov.info 2>/dev/null || true
            echo "✅ $name OK"
          done

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 1

  # ── JOB 2: SonarCloud analiza TODO el repo (1 solo proyecto) ───────────────
  # PUNTO CLAVE DEL DEMO: SonarCloud analiza todos los servicios y pasa.
  # No tiene reglas para BOX-001/002/003 (envelope, panics, arquitectura).
  # Solo el Conformance Gate detectará las violaciones en rust-svc-bad.
  sonarcloud:
    name: "SonarCloud · análisis completo del repo"
    needs: [test-services]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Sonar analiza: bugs, vulnerabilities, security hotspots, code smells,
        # cognitive complexity, duplicaciones y cobertura (lcov.info)
        # Expected: PASS ✅ — demuestra limitación de Sonar para reglas
        # arquitecturales/semánticas (BOX-001/002/003, OCI-003/004/005)

  # ── JOB 3: Conformance Gate — evalúa TODOS los servicios automáticamente ────
  # Un solo job escanea services/ completo.
  # Si agregas services/nuevo-svc/ no hace falta tocar este archivo.
  # PUNTO CLAVE DEL DEMO: rust-svc pasa ✅, rust-svc-bad bloquea ❌
  conformance:
    name: "Conformance Gate · todos los servicios (IA)"
    needs: [sonarcloud]
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Conformance Gate
        uses: Rxcxrdx/conformance-agent@v6.3
        with:
          services-dir: services
        # rust-svc  → PASS ✅
        # rust-svc-bad → BLOCK ❌ (OCI-003 + BOX-001/002)
        # job exits 1 → merge bloqueado
