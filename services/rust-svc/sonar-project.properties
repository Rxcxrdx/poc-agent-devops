# SonarCloud configuration for rust-svc
# Replace SONAR_ORG with your SonarCloud organization slug
# (found at sonarcloud.io → your organization → Administration → Organization Key)

sonar.projectKey=conformance-gate_rust-svc
sonar.organization=SONAR_ORG

sonar.projectName=rust-svc
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclude test code from analysis
sonar.exclusions=src/**/*test*,src/**/*spec*
sonar.test.inclusions=src/**/*test*

# Coverage report (optional — uncomment if you generate lcov)
# sonar.rust.lcov.reportPaths=target/coverage/lcov.info
